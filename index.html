<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - DE Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: var(--color-bg-sidebar);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .gateway-card {
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            animation: slide-up 0.5s ease-out;
        }

        .gateway-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            color: var(--color-text-primary);
        }

        .gateway-logo svg {
            width: 28px;
            height: 28px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .gateway-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .gateway-subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 36px;
            line-height: 1.5;
        }

        .gateway-action {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .gateway-btn {
            width: 100%;
            justify-content: center;
            padding: 12px 16px;
            font-size: 14px;
            border-radius: var(--radius-md);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="gateway-card">
        <div class="gateway-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>
        
        <h1 class="gateway-title">Detection Engineering Console</h1>
        
        <p class="gateway-subtitle">Centralized workspace for Detection Engineers.</p>
        
        <div class="gateway-action">
            <a href="index.php" class="btn btn-primary gateway-btn">
                <span>Go to Dashboard</span>
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
            
            <a href="docs.html" class="btn btn-secondary gateway-btn">
                <span>Read Documentation</span>
            </a>
        </div>
    </div>

</body>
</html>
